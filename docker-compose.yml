services:
  mysql:
    image: mysql:8.0
    container_name: insurance-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: insurance
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: insurance
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

  ui:
    build:
      context: ./demo-ui
      dockerfile: Dockerfile
    container_name: insurance-ui
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  mysql_data:
