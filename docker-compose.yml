services:
  # MySQL Database - Always runs
  mysql:
    image: mysql:8.0
    container_name: insurance-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: insurance
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot API - Always runs
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: insurance
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

  # Production UI - nginx serving built React app
  # Only runs with: docker-compose --profile prod up
  ui:
    build:
      context: ./demo-ui
      dockerfile: Dockerfile
    container_name: insurance-ui
    ports:
      - "3000:80"
    depends_on:
      - app
    profiles:
      - prod

  # Development UI - Vite dev server with HMR
  # Only runs with: docker-compose --profile dev up
  ui-dev:
    image: node:20-alpine
    container_name: insurance-ui-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./demo-ui:/app
      - ui_dev_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - app
    profiles:
      - dev

volumes:
  mysql_data:
  ui_dev_node_modules:
