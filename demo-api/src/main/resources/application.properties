spring.application.name=demo

spring.threads.virtual.enabled=true

# mysql root configration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:insurance}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

#ORM s/w specific properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#spring.mvc.throw-exception-if-no-handler-found=true
#spring.web.resources.add-mappings=false
# spring.mvc.dispatch-options-request=true



# API Versioning
api.version=v1

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Caching
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

# CORS origins (comma-separated)
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}

# Rate limiting (disabled by default, enable in production)
rate.limit.enabled=false
rate.limit.capacity=100
rate.limit.refill.tokens=100
rate.limit.refill.duration=1m

# Request logging (disabled by default, enable for debugging)
logging.request.enabled=false